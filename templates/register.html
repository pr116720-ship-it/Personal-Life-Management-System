<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Life Management</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            width: 100%;
            max-width: 450px;
            padding: 50px 40px;
            animation: fadeInUp 0.8s ease forwards;
        }
        .login-title {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #c084fc, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }
        .input-group-text.custom-input {
            border-right: none;
            background: rgba(255, 255, 255, 0.05) !important;
        }
        .form-control.custom-input.border-start-0 {
            border-left: none;
            padding-left: 0;
        }
        .form-control.custom-input.border-start-0:focus {
            box-shadow: none !important;
            border-color: rgba(255, 255, 255, 0.2) !important;
        }
        .input-group:focus-within .custom-input {
            border-color: var(--primary-color) !important;
        }
        
        .alert-glass {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body class="landing-bg">

    <div class="login-container">
        <div class="glass login-box">
            <h2 class="login-title">Join Us</h2>
            <p class="login-subtitle">Create an account to start managing your life</p>
            
            {% if error %}
            <div class="alert-glass">
                <i class="fas fa-exclamation-circle me-2"></i> {{ error }}
            </div>
            {% endif %}

            <form action="{{ url_for('register') }}" method="POST">
                <div class="mb-4">
                    <label class="mb-2 text-white-50 fw-semibold" style="font-size: 0.9rem;">Username</label>
                    <div class="input-group">
                        <span class="input-group-text custom-input"><i class="fas fa-user text-white-50"></i></span>
                        <input type="text" class="form-control custom-input border-start-0" name="username" placeholder="Choose a username" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="mb-2 text-white-50 fw-semibold" style="font-size: 0.9rem;">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text custom-input"><i class="fas fa-envelope text-white-50"></i></span>
                        <input type="email" class="form-control custom-input border-start-0" name="email" placeholder="e.g. user@gmail.com" required>
                    </div>
                </div>
                
                <div class="mb-5">
                    <label class="mb-2 text-white-50 fw-semibold" style="font-size: 0.9rem;">Password</label>
                    <div class="input-group">
                        <span class="input-group-text custom-input"><i class="fas fa-lock text-white-50"></i></span>
                        <input type="password" class="form-control custom-input border-start-0" name="password" placeholder="Create a strong password" required>
                    </div>
                </div>

                <button type="submit" class="primary-btn w-100 border-0" style="padding: 15px; font-size: 1.1rem; border-radius: 12px;">
                    Create Account <i class="fas fa-user-plus ms-2"></i>
                </button>
            </form>
            
            <div class="text-center mt-4">
                <a href="{{ url_for('login') }}" class="text-white-50 text-decoration-none" style="font-size: 0.9rem; transition: color 0.3s ease;">
                    Already have an account? <span class="text-primary">Login here</span>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
